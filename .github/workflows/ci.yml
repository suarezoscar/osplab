name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Formato (Prettier) — auto-fix si falla
  # ────────────────────────────────────────────────────────────────────────────
  format:
    name: Prettier check
    runs-on: ubuntu-latest
    permissions:
      contents: write # necesario para que el bot pueda commitear el auto-fix

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # En PRs hace checkout de la rama del PR (no del merge commit)
          # para que el auto-commit vaya a la rama correcta
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        id: prettier_check
        run: pnpm format:check
        continue-on-error: true

      # Si Prettier falla → corrige automáticamente y commitea
      - name: Auto-fix formatting
        if: steps.prettier_check.outcome == 'failure'
        run: pnpm format

      - name: Commit formatting fixes
        if: steps.prettier_check.outcome == 'failure'
        # Pinado a SHA para evitar ataques de supply chain en acciones de terceros
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: 'style: auto-fix Prettier formatting'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'

      # Falla la run actual para avisar al developer que hay un auto-commit
      - name: Fail if auto-fix was applied
        if: steps.prettier_check.outcome == 'failure'
        run: |
          echo "❌ Prettier encontró problemas de formato."
          echo "Se han corregido automáticamente. Haz 'git pull' y vuelve a pushear."
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Lint + Tests unitarios (solo proyectos afectados)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Unit tests (affected)
    runs-on: ubuntu-latest
    permissions:
      contents: read # solo lectura del código

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Historial completo necesario para que nx affected pueda comparar
          fetch-depth: 0

      # Determina la base de comparación según el tipo de evento:
      #   push a master  → compara con el commit anterior (HEAD~1)
      #   pull_request   → compara con la rama destino (origin/master)
      - name: Configurar NX_BASE (push)
        if: github.event_name == 'push'
        run: echo "NX_BASE=HEAD~1" >> $GITHUB_ENV

      # FIX: script injection — usar variable de entorno en lugar de interpolar
      # ${{ github.base_ref }} directamente en shell (podría contener comandos)
      - name: Configurar NX_BASE (pull_request)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          echo "NX_BASE=origin/$BASE_REF" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        env:
          # prisma generate no conecta a la BD pero prisma.config.ts valida que
          # DATABASE_URL esté definida. Usamos una URL ficticia solo para este paso.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm prisma:generate

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Lint (affected)
        run: pnpm nx affected -t lint --base=${{ env.NX_BASE }} --head=HEAD --parallel=3

      - name: Test (affected)
        run: pnpm nx affected -t test --base=${{ env.NX_BASE }} --head=HEAD --parallel=3 --no-coverage

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Auditoría de seguridad (dependencias + secretos)
  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read # lectura del historial para gitleaks
      security-events: write # para subir resultados SARIF al Security dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # necesario para que gitleaks escanee el historial de commits del PR

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level=high --prod

      # Pinado a SHA para evitar ataques de supply chain
      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
