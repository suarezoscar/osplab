name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Formato (Prettier)
  # ────────────────────────────────────────────────────────────────────────────
  format:
    name: Prettier check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        run: pnpm format:check

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Lint + Tests unitarios (solo proyectos afectados)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Unit tests (affected)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Historial completo necesario para que nx affected pueda comparar
          fetch-depth: 0

      # Determina la base de comparación según el tipo de evento:
      #   push a master  → compara con el commit anterior (HEAD~1)
      #   pull_request   → compara con la rama destino (origin/master)
      - name: Configurar NX_BASE (push)
        if: github.event_name == 'push'
        run: echo "NX_BASE=HEAD~1" >> $GITHUB_ENV

      - name: Configurar NX_BASE (pull_request)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          echo "NX_BASE=origin/${{ github.base_ref }}" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Lint (affected)
        run: pnpm nx affected -t lint --base=${{ env.NX_BASE }} --head=HEAD --parallel=3

      - name: Test (affected)
        run: pnpm nx affected -t test --base=${{ env.NX_BASE }} --head=HEAD --parallel=3 --no-coverage

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Auditoría de seguridad (dependencias + secretos)
  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Falla si hay vulnerabilidades HIGH o CRITICAL en dependencias directas
      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level=high --prod

      # Escanea el código en busca de secretos accidentalmente commiteados
      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
