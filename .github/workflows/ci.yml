name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Variables compartidas ──────────────────────────────────────────────────────
env:
  NODE_VERSION: 22
  GITLEAKS_VERSION: '8.24.3'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Formato (Prettier)
  # Los desarrolladores deben tener el pre-commit hook de husky activo para
  # formatear automáticamente antes de hacer commit (`pnpm prepare`).
  # Este job actúa como red de seguridad en CI.
  # ────────────────────────────────────────────────────────────────────────────
  format:
    name: Prettier check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: |
          if ! pnpm format:check; then
            echo ""
            echo "❌ Hay archivos sin formatear."
            echo "   Ejecuta 'pnpm format' localmente y haz commit de los cambios."
            echo "   Tip: activa el hook de pre-commit con 'pnpm prepare' para que"
            echo "   Prettier se ejecute automáticamente en cada commit."
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Lint + Tests unitarios (solo proyectos afectados)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Unit tests (affected)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      NX_DAEMON: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar NX_BASE (push)
        if: github.event_name == 'push'
        run: echo "NX_BASE=HEAD~1" >> $GITHUB_ENV

      - name: Configurar NX_BASE (pull_request)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          echo "NX_BASE=origin/$BASE_REF" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm prisma:generate

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            nx-${{ runner.os }}-

      - name: Lint (affected)
        run: pnpm nx affected -t lint --base=${{ env.NX_BASE }} --head=HEAD --parallel=3

      - name: Test (affected)
        run: pnpm nx affected -t test --base=${{ env.NX_BASE }} --head=HEAD --parallel=3 --no-coverage

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Auditoría de seguridad
  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level=high --prod

      # Ejecutamos gitleaks CLI directamente para evitar el bug del gitleaks-action
      # cuando el commit base del PR es el primer commit del repo (base_sha^ inválido).
      - name: Scan for secrets (Gitleaks)
        id: gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect \
            --redact \
            --report-format sarif \
            --report-path results.sarif \
            --exit-code 1
        continue-on-error: true

      - name: Ensure SARIF exists (fallback si gitleaks no lo creó)
        if: always()
        run: |
          [ -f results.sarif ] || echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[]}' > results.sarif

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
        continue-on-error: true

      - name: Fail si se encontraron secretos
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "❌ Gitleaks encontró secretos en el código."
          echo "   Revisa el reporte en la pestaña Security > Code scanning."
          exit 1
