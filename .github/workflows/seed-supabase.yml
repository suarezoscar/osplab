name: Seed Supabase

on:
  workflow_dispatch:
    inputs:
      province:
        description: 'Provincia a seedear'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - ourense
          - pontevedra
          - lugo
          - coruña
          - madrid
      confirm:
        description: '⚠️ Escribe "yes" para confirmar el seed en producción'
        required: true
        type: string

# ── Variables compartidas ─────────────────────────────────────────────────────
env:
  NODE_VERSION: 22
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_HOST: 'aws-1-eu-north-1.pooler.supabase.com'
  SUPABASE_PORT: '5432'
  SUPABASE_USER: 'postgres.vrqaamkqoiuppqtrzpbu'
  SUPABASE_DB: 'postgres'

jobs:
  seed:
    name: 'Seed Supabase — ${{ github.event.inputs.province }}'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Validar confirmación
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "❌ Debes escribir 'yes' para confirmar. Abortando."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://${{ env.SUPABASE_USER }}:placeholder@${{ env.SUPABASE_HOST }}:${{ env.SUPABASE_PORT }}/${{ env.SUPABASE_DB }}
        run: pnpm prisma:generate

      - name: Run seeds (${{ github.event.inputs.province }})
        env:
          DATABASE_URL: postgresql://${{ env.SUPABASE_USER }}:${{ secrets.SUPABASE_PASSWORD }}@${{ env.SUPABASE_HOST }}:${{ env.SUPABASE_PORT }}/${{ env.SUPABASE_DB }}
        run: bash scripts/seed-supabase.sh "${{ github.event.inputs.province }}"
