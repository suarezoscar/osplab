name: Seed Supabase

on:
  workflow_dispatch:
    inputs:
      province:
        description: 'Provincia a seedear'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - ourense
          - pontevedra
          - lugo
          - coruña
          - madrid
          - barcelona
      confirm:
        description: '⚠️ Escribe "yes" para confirmar el seed en producción'
        required: true
        type: string

# ── Variables compartidas ─────────────────────────────────────────────────────
env:
  NODE_VERSION: 22
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_HOST: 'aws-1-eu-north-1.pooler.supabase.com'
  SUPABASE_PORT: '5432'
  SUPABASE_USER: 'postgres.vrqaamkqoiuppqtrzpbu'
  SUPABASE_DB: 'postgres'
  API_BASE_URL: 'https://farmacias.osplab.dev/api'

jobs:
  # ── 1. Validar confirmación ──────────────────────────────────────────────────
  validate:
    name: Validar confirmación
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar "yes"
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "❌ Debes escribir 'yes' para confirmar. Abortando."
            exit 1
          fi

  # ── 2. Resolver qué provincias ejecutar ──────────────────────────────────────
  resolve:
    name: Resolver provincias
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.province }}" = "all" ]; then
            echo 'matrix=["ourense","pontevedra","lugo","coruña","madrid","barcelona"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=["${{ github.event.inputs.province }}"]' >> "$GITHUB_OUTPUT"
          fi

  # ── 3. Seed por provincia (jobs paralelos e independientes) ──────────────────
  seed:
    name: '${{ matrix.province }}'
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        province: ${{ fromJson(needs.resolve.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://${{ env.SUPABASE_USER }}:placeholder@${{ env.SUPABASE_HOST }}:${{ env.SUPABASE_PORT }}/${{ env.SUPABASE_DB }}
        run: pnpm prisma:generate

      - name: 'Seed — ${{ matrix.province }} (direct)'
        if: matrix.province != 'lugo'
        env:
          DATABASE_URL: postgresql://${{ env.SUPABASE_USER }}:${{ secrets.SUPABASE_PASSWORD }}@${{ env.SUPABASE_HOST }}:${{ env.SUPABASE_PORT }}/${{ env.SUPABASE_DB }}
        run: bash scripts/seed-supabase.sh "${{ matrix.province }}"

      # ── Lugo: relay via API server (EU) ──────────────────────────────────
      # coflugo.org bloquea/rate-limita IPs de datacenters (EEUU).
      # Delegamos al API desplegado en Render (EU) que ya tiene el scraper.
      # El endpoint es SÍNCRONO — espera a que termine y devuelve el resultado.
      - name: 'Seed — lugo (via API relay EU)'
        if: matrix.province == 'lugo'
        run: |
          echo "🌐 Delegando scraping de Lugo al API server (EU)..."
          echo "   Endpoint: ${{ env.API_BASE_URL }}/admin/scrape/coflugo"
          echo "   ⏳ Esto tarda ~60s (66 municipios con delay entre requests)"
          echo ""

          HTTP_STATUS=$(curl -sS -o /tmp/api-response.json -w "%{http_code}" \
            -X POST \
            -H "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}" \
            --max-time 300 \
            "${{ env.API_BASE_URL }}/admin/scrape/coflugo")

          echo "📡 HTTP $HTTP_STATUS"
          cat /tmp/api-response.json | python3 -m json.tool 2>/dev/null || cat /tmp/api-response.json
          echo ""

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ El API respondió con HTTP $HTTP_STATUS en lugar de 200."
            echo "   Verifica que ADMIN_API_KEY sea correcta y que el API esté levantado."
            exit 1
          fi

          # Verificar que se guardaron turnos
          SAVED=$(python3 -c "import json; print(json.load(open('/tmp/api-response.json'))['result']['saved'])" 2>/dev/null || echo "0")
          ERRORS=$(python3 -c "import json; print(json.load(open('/tmp/api-response.json'))['result']['errors'])" 2>/dev/null || echo "?")

          echo "✅ Lugo completado: ${SAVED} turnos guardados, ${ERRORS} errores HTTP"

          if [ "$SAVED" = "0" ]; then
            echo "⚠️  0 turnos guardados — posible problema con coflugo.org"
            exit 1
          fi
