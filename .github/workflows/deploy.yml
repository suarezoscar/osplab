name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false # No cancelar despliegues en curso

env:
  NODE_VERSION: 22
  NX_DAEMON: 'false'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Detectar qué proyectos están afectados ────────────────────────
  changes:
    name: Detect affected projects
    runs-on: ubuntu-latest
    outputs:
      landing: ${{ steps.check.outputs.landing }}
      farmacias-web: ${{ steps.check.outputs.farmacias-web }}
      farmacias-api: ${{ steps.check.outputs.farmacias-api }}
      events: ${{ steps.check.outputs.events }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check affected projects
        id: check
        run: |
          AFFECTED=$(pnpm nx show projects --affected --base=HEAD~1 --head=HEAD)
          echo "Affected projects: $AFFECTED"

          echo "landing=false" >> $GITHUB_OUTPUT
          echo "farmacias-web=false" >> $GITHUB_OUTPUT
          echo "farmacias-api=false" >> $GITHUB_OUTPUT
          echo "events=false" >> $GITHUB_OUTPUT

          if echo "$AFFECTED" | grep -q "^landing$"; then
            echo "landing=true" >> $GITHUB_OUTPUT
          fi
          if echo "$AFFECTED" | grep -q "^farmacias-web$"; then
            echo "farmacias-web=true" >> $GITHUB_OUTPUT
          fi
          if echo "$AFFECTED" | grep -q "^farmacias-api$"; then
            echo "farmacias-api=true" >> $GITHUB_OUTPUT
          fi
          if echo "$AFFECTED" | grep -q "^events$"; then
            echo "events=true" >> $GITHUB_OUTPUT
          fi

  # ── Migraciones Prisma (antes del deploy del API) ─────────────────
  migrate:
    name: Run Prisma migrations
    needs: changes
    if: needs.changes.outputs.farmacias-api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Session pooler de Supabase (puerto 5432): soporta DDL + advisory locks
    # y es accesible desde GitHub Actions sin necesidad del IPv4 add-on.
    # La URL directa (db.vrqaamkqoiuppqtrzpbu.supabase.co:5432) NO es accesible
    # desde las IPs dinámicas de los runners de GH Actions.
    env:
      SUPABASE_SESSION_HOST: 'aws-1-eu-north-1.pooler.supabase.com'
      SUPABASE_SESSION_PORT: '5432'
      SUPABASE_USER: 'postgres.vrqaamkqoiuppqtrzpbu'
      SUPABASE_DB: 'postgres'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://${{ env.SUPABASE_USER }}:${{ secrets.SUPABASE_PASSWORD }}@${{ env.SUPABASE_SESSION_HOST }}:${{ env.SUPABASE_SESSION_PORT }}/${{ env.SUPABASE_DB }}
          DIRECT_URL: postgresql://${{ env.SUPABASE_USER }}:${{ secrets.SUPABASE_PASSWORD }}@${{ env.SUPABASE_SESSION_HOST }}:${{ env.SUPABASE_SESSION_PORT }}/${{ env.SUPABASE_DB }}

  # ── Deploy Landing → Cloudflare Pages ─────────────────────────────
  deploy-landing:
    name: Deploy landing → Cloudflare Pages
    needs: changes
    if: needs.changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build landing
        run: pnpm nx build landing

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/apps/landing/browser --project-name=osplab-landing

  # ── Deploy Farmacias Web → Cloudflare Pages ───────────────────────
  deploy-farmacias-web:
    name: Deploy farmacias-web → Cloudflare Pages
    needs: changes
    if: needs.changes.outputs.farmacias-web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build farmacias-web
        run: pnpm nx build farmacias-web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/apps/farmacias-web/browser --project-name=osplab-farmacias

  # ── Deploy Events → Cloudflare Pages ─────────────────────────────
  deploy-events:
    name: Deploy events → Cloudflare Pages
    needs: changes
    if: needs.changes.outputs.events == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build events
        run: pnpm nx build events

      - name: Copy Cloudflare Functions to build output
        run: cp -r apps/events/functions dist/apps/events/browser/functions

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/apps/events/browser --project-name=osplab-events --branch=master

  # ── Deploy Farmacias API → Render ───────────────────────────────────
  # Render auto-deploya desde GitHub en cada push a master.
  # NO necesita webhook — el servicio está conectado al repo.
  # Si en el futuro desactivas auto-deploy en Render, descomenta el job
  # y configura el secret RENDER_DEPLOY_HOOK_URL.
