<div class="flex min-h-screen flex-col text-[#dce6ef]">
  <!-- ─── HEADER ────────────────────────────────────────────────────────── -->
  <header class="mx-auto w-full max-w-lg px-6 pt-10 pb-6">
    <div class="flex flex-col items-center gap-4 text-center">
      <a routerLink="/" class="transition-opacity hover:opacity-80">
        <img
          src="/assets/svg/osp-logo.svg"
          alt="OSPLab"
          class="h-16 w-auto select-none"
          draggable="false"
          width="120"
          height="66" />
      </a>
      <div>
        <h1 class="text-2xl font-bold text-white">Crear evento</h1>
        <p class="mt-1 text-[0.92rem] text-[#8badc4]">Comparte el enlace en WhatsApp y deja que la gente se apunte.</p>
      </div>
    </div>
  </header>

  <!-- ─── FORMULARIO ────────────────────────────────────────────────────── -->
  <main class="mx-auto w-full max-w-lg flex-1 px-6 pb-16">
    <form (ngSubmit)="onSubmit()" class="ev-card backdrop-blur-sm">
      <!-- Error -->
      @if (error()) {
        <div class="mb-5 rounded-lg border border-red-800/50 bg-red-950/40 px-4 py-3 text-[0.88rem] text-red-300">
          {{ error() }}
        </div>
      }

      <!-- Título -->
      <div class="mb-5">
        <label for="title" class="ev-label">Título del evento</label>
        <input
          id="title"
          type="text"
          placeholder="Ej: Cena de Navidad"
          [ngModel]="title()"
          (ngModelChange)="title.set($event)"
          name="title"
          maxlength="120"
          class="ev-input" />
      </div>

      <!-- Lugar -->
      <div class="mb-5">
        <label class="ev-label">📍 Lugar</label>
        <app-location-picker (locationSelected)="onLocationSelected($event)" />
      </div>

      <!-- Fecha -->
      <div class="mb-5">
        <label for="eventDate" class="ev-label">📅 Fecha y hora</label>
        <input
          id="eventDate"
          type="datetime-local"
          [min]="minDateTime"
          [ngModel]="eventDate()"
          (ngModelChange)="eventDate.set($event)"
          name="eventDate"
          class="ev-input [color-scheme:dark]" />
      </div>

      <!-- Contraseña -->
      <div class="mb-6">
        <label for="password" class="ev-label">
          🔒 Contraseña de edición
          <span class="font-normal normal-case tracking-normal text-[#4d7a9a]">(opcional)</span>
        </label>
        <input
          id="password"
          type="password"
          placeholder="Para poder editar después"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          maxlength="100"
          class="ev-input" />
        <p class="mt-1.5 text-[0.78rem] text-[#4d7a9a]">
          Si no pones contraseña, nadie podrá editar el evento después.
        </p>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="submitting()"
        class="group flex w-full items-center justify-center gap-2 rounded-lg bg-[#f59e0b] px-6 py-3.5 text-[0.95rem] font-semibold text-[#1a0e00] shadow-lg shadow-[#f59e0b]/20 transition-all duration-200 hover:bg-[#d97706] hover:shadow-[#f59e0b]/30 disabled:cursor-not-allowed disabled:opacity-50">
        @if (submitting()) {
          <svg class="h-5 w-5 animate-spin" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
          </svg>
          Creando…
        } @else {
          Crear evento
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="transition-transform group-hover:translate-x-0.5">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        }
      </button>
    </form>

    <!-- Volver -->
    <div class="mt-6 text-center">
      <a routerLink="/" class="text-[0.85rem] text-[#5a8fb5] transition-colors hover:text-white">
        ← Volver al inicio
      </a>
    </div>
  </main>

  <!-- ─── FOOTER ────────────────────────────────────────────────────────── -->
  <footer class="border-t border-[#0e2236] py-6">
    <p class="text-center text-[0.7rem] text-[#2e5a7a]">osplab.dev</p>
  </footer>
</div>
